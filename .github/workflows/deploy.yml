name: Deploy to TestFlight

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Copy signing keys
        run: cp -r /Users/shloimyfuchs/Desktop/calorie\ tracker/private_keys ./private_keys

      - name: Unlock CI keychain
        run: |
          security unlock-keychain -p "ci-build" ~/Library/Keychains/ci-build.keychain-db
          security list-keychains -d user -s ~/Library/Keychains/ci-build.keychain-db ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci-build" ~/Library/Keychains/ci-build.keychain-db

      - name: Deploy to TestFlight
        run: ./deploy.sh
